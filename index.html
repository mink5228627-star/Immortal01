<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Satellite Call</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:sans-serif;
    color:white;
}

h1{
    position:absolute;
    top:40px;
    font-size:28px;
    font-weight:600;
}

#codeInput{
    width:500px;
    max-width:80%;
    padding:18px 20px;
    font-size:20px;
    border:none;
    border-radius:10px;
    outline:none;
    text-align:center;
}
</style>
</head>

<body>

<h1>위성전화 전화걸기</h1>

<input 
id="codeInput"
type="text"
placeholder="전화번호 입력"
/>

<script>
const input = document.getElementById("codeInput");

input.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        const code = input.value.trim();

        if(code === "+8816XXXX8724"){
            window.location.href = "oracle.html";
        }

        else if(code === "+8816XXXX0127"){
            window.location.href = "orecle2.html";
        }

        else{
            input.value = "";
            input.placeholder = "연결 실패";
        }

    }

});
</script>

</body>
</html>
